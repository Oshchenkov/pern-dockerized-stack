version: '3.9'

services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: demo_api_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       demo_api
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Development service (hot-reload) ─────────────────────────────────────────
  api-dev:
    build:
      context: .
      target: development       # ← uses the "development" Dockerfile stage
    container_name: demo_api_dev
    env_file: .env
    environment:
      DB_HOST: postgres
    ports:
      - '3000:3000'
    volumes:
      - ./src:/app/src           # live-mount source for hot-reload
    depends_on:
      postgres:
        condition: service_healthy

  # ── Production service ───────────────────────────────────────────────────────
  api-prod:
    build:
      context: .
      target: production        # ← uses the "production" Dockerfile stage
    container_name: demo_api_prod
    env_file: .env
    environment:
      DB_HOST: postgres
    ports:
      - '3001:3000'             # expose on :3001 so both can run side-by-side
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - prod                    # only starts with: docker compose --profile prod up

  # ── pgAdmin (optional) ───────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: demo_api_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - postgres
    profiles:
      - tools                   # only starts with: docker compose --profile tools up

volumes:
  pgdata:
