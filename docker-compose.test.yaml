# =============================================================================
# docker-compose.test.yaml — local prod topology test (no TLS)
# Usage: docker compose -f docker-compose.yaml -f docker-compose.test.yaml up --build
# =============================================================================

services:

  db:
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-testpassword}
    networks:
      - internal

  api:
    build:
      target: production
    restart: always
    environment:
      NODE_ENV: production
    expose:
      - "${API_PORT:-4000}"
    networks:
      - internal

  client:
    build:
      target: production
    restart: always
    expose:
      - "3000"
    networks:
      - internal

  nginx:
    image: nginx:1.31.1-alpine
    restart: always
    depends_on:
      - api
      - client
    ports:
      - "80:80"       # HTTP only — no TLS locally
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/test.conf:/etc/nginx/conf.d/default.conf:ro  # override with test config
    networks:
      - internal

networks:
  internal:
    driver: bridge