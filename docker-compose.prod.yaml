# =============================================================================
# docker-compose.prod.yaml — production overrides
# Usage: docker compose -f docker-compose.yaml -f docker-compose.prod.yaml up --build -d
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Database — NOT exposed externally; internal network only
  # ---------------------------------------------------------------------------
  db:
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required in production}
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  # ---------------------------------------------------------------------------
  # API — production build, no source mounts, no debug ports
  # ---------------------------------------------------------------------------
  api:
    build:
      target: production
    restart: always
    environment:
      NODE_ENV: production
    # Port is NOT published directly — Nginx proxies to it
    expose:
      - "3000"
    deploy:
      replicas: 1          # increase for horizontal scaling
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
      restart_policy:
        condition: on-failure
        max_attempts: 3

  # ---------------------------------------------------------------------------
  # Client — built static assets served by Nginx (no Node process at runtime)
  # ---------------------------------------------------------------------------
  client:
    build:
      target: production
    # The client service is only used to produce the build artefact.
    # Nginx serves the static files; the client container can exit after build.
    profiles:
      - build-only          # exclude from default up; used during CI build steps

  # ---------------------------------------------------------------------------
  # Nginx — reverse proxy + static file server
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    restart: always
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # Mount the React build output (built by CI / multi-stage build)
      - ./client/dist:/usr/share/nginx/html:ro
      # TLS certificates (e.g. from Let's Encrypt / Certbot)
      - ./nginx/certs:/etc/nginx/certs:ro
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M
