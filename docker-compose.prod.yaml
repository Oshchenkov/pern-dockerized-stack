# =============================================================================
# docker-compose.prod.yaml — production overrides
# Usage: docker compose -f docker-compose.yaml -f docker-compose.prod.yaml up --build -d
#
# Network topology:
#   internet  ──▶  nginx (80 / 443)
#                    │
#               [ internal ]          ← isolated bridge; no host ports
#                    ├── client :3000  (Next.js standalone)
#                    ├── api    :4000  (Express)
#                    └── db     :5432  (PostgreSQL)
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Database — internal only, never reachable from the host
  # ---------------------------------------------------------------------------
  db:
    restart: always
    # No `ports:` — reachable only via service name "db" on the internal network
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required in production}
    networks:
      - internal
    # deploy:
    #   resources:
    #     limits:
    #       cpus: "1"
    #       memory: 512M

  # ---------------------------------------------------------------------------
  # API — internal only; Nginx proxies requests to http://api:4000
  # ---------------------------------------------------------------------------
  api:
    image: pern-server-prod
    container_name: pern-server-prod
    build:
      target: production
    restart: always
    environment:
      NODE_ENV: production
    # expose makes port 4000 reachable within the internal network only
    expose:
      - "${API_PORT:-4000}"
    networks:
      - internal
    # deploy:
    #   replicas: 1          # increase for horizontal scaling
    #   resources:
    #     limits:
    #       cpus: "0.5"
    #       memory: 256M
    #   restart_policy:
    #     condition: on-failure
    #     max_attempts: 3

  # ---------------------------------------------------------------------------
  # Client — built static assets served by Nginx (no Node process at runtime)
  # ---------------------------------------------------------------------------
  client:
    build:
      target: production
    restart: always
    expose:
      - "3000"
    networks:
      - internal
    # profiles:
    #   - build-only          # exclude from default up; used during CI build steps

  # ---------------------------------------------------------------------------
  # Nginx — reverse proxy + static file server
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.31.1-alpine
    restart: always
    depends_on:
      api:
        condition: service_healthy
      client:
        condition: service_started
    ports:
      - "80:80"
      # - "443:443"
    volumes:
      # - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # - ./nginx/certs:/etc/nginx/certs:ro
      # for local testing, we can mount a single config that overrides the default with test-specific settings (no TLS, etc.)
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/test.conf:/etc/nginx/conf.d/default.conf:ro  # override with test config
    networks:
      - internal
    # deploy:
    #   resources:
    #     limits:
    #       cpus: "0.25"
    #       memory: 64M

networks:
  internal:
    driver: bridge