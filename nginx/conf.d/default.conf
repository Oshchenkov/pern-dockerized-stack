# =============================================================================
# nginx/conf.d/default.conf — virtual host
#
# Responsibilities:
#   • Redirect all HTTP → HTTPS
#   • Proxy /api/* → Express API        (http://api:4000)
#   • Proxy /*     → Next.js standalone (http://client:3000)
#   • Security headers
#
# TLS certificates are expected at:
#   ./nginx/certs/fullchain.pem   (certificate + intermediates)
#   ./nginx/certs/privkey.pem     (private key)
#
# To generate a self-signed cert for testing:
#   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#     -keyout ./nginx/certs/privkey.pem \
#     -out    ./nginx/certs/fullchain.pem \
#     -subj "/CN=localhost"
# =============================================================================

# -----------------------------------------------------------------------------
# Upstreams
# -----------------------------------------------------------------------------
upstream api_backend {
    server api:4000;
    keepalive 32;
}

upstream client_backend {
    server client:3000;    # Next.js standalone server
    keepalive 32;
}

# -----------------------------------------------------------------------------
# HTTP — redirect everything to HTTPS
# -----------------------------------------------------------------------------
server {
    listen      80;
    listen [::]:80;
    server_name _;    # catch-all; replace with your domain in production

    # Allow Let's Encrypt ACME challenges through before redirecting
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# -----------------------------------------------------------------------------
# HTTPS — main server block
# -----------------------------------------------------------------------------
server {
    listen      443 ssl;
    listen [::]:443 ssl;
    http2       on;
    server_name _;    # replace with your actual domain, e.g. example.com

    # -------------------------------------------------------------------------
    # TLS
    # -------------------------------------------------------------------------
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # HSTS — enable after confirming TLS works correctly
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # -------------------------------------------------------------------------
    # Security headers
    # -------------------------------------------------------------------------
    add_header X-Frame-Options        "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options "nosniff"                         always;
    add_header X-XSS-Protection       "1; mode=block"                   always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;

    # -------------------------------------------------------------------------
    # API proxy — /api/* → Express (strips the /api prefix)
    # -------------------------------------------------------------------------
    location /api/ {
        proxy_pass         http://api_backend/;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout  10s;
        proxy_send_timeout     30s;
        proxy_read_timeout     30s;
    }

    # -------------------------------------------------------------------------
    # Client proxy — /* → Next.js standalone server
    # -------------------------------------------------------------------------
    location / {
        proxy_pass         http://client_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Required for Next.js to generate correct absolute URLs internally
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  443;

        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;
    }
}
